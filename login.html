<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Coût de Revient Pâtisserie</title>
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="simulator.css"> <!-- Reusing some simulator styles -->
    <style>
        .login-main {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: var(--radius);
            padding: 2.5rem;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-family: var(--font-display);
            font-size: 1.75rem;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: #1a1a2e;
            /* Darker, solid background for visibility */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-sm);
            color: #fff;
            /* White text for contrast */
            font-family: var(--font-body);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-group input:focus {
            border-color: var(--color-gold);
            background: #242444;
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.2);
        }

        .pin-group {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .pin-input {
            width: 45px !important;
            height: 55px;
            text-align: center;
            font-size: 1.5rem !important;
            font-weight: 700;
        }
    </style>
</head>

<body class="simulator-body" style="background: #0a0a12; color: #fff;">
    <header class="sim-header">
        <a href="index.html" class="sim-header__logo">
            <span class="logo-icon">🧁</span>
            <div class="logo-text">
                <span class="logo-main">PastryCost</span>
                <span class="logo-sub">Simulator</span>
            </div>
        </a>
    </header>

    <main class="login-main">
        <div class="login-card">
            <div class="login-header">
                <h1>Bienvenue</h1>
                <p>Identifiez-vous pour gérer vos recettes</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="userName">Votre Nom / Pseudo</label>
                    <input type="text" id="userName" required placeholder="Ex: Chef Julia" autofocus>
                </div>

                <div class="form-group">
                    <label>Code PIN (4 chiffres)</label>
                    <div class="pin-group">
                        <input type="password" class="pin-input" maxlength="1" required pattern="\d"
                            inputmode="numeric">
                        <input type="password" class="pin-input" maxlength="1" required pattern="\d"
                            inputmode="numeric">
                        <input type="password" class="pin-input" maxlength="1" required pattern="\d"
                            inputmode="numeric">
                        <input type="password" class="pin-input" maxlength="1" required pattern="\d"
                            inputmode="numeric">
                    </div>
                </div>

                <button type="submit" class="btn btn--gold" style="width: 100%; padding: 0.85rem; font-weight: 700;">
                    Se connecter
                </button>
            </form>
            <p style="margin-top: 1.5rem; text-align: center; font-size: 0.8rem; color: var(--text-muted);">
                Données sauvegardées localement pour ce duo Nom + PIN.
            </p>
        </div>
    </main>

    <script src="auth.js"></script>
    <script>
        // PIN input auto-tabbing
        const pins = document.querySelectorAll('.pin-input');
        pins.forEach((p, i) => {
            p.addEventListener('input', (e) => {
                if (e.target.value && i < pins.length - 1) pins[i + 1].focus();
            });
            p.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && i > 0) pins[i - 1].focus();
            });
        });

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('userName').value.trim();
            const pin = Array.from(pins).map(p => p.value).join('');

            if (name && pin.length === 4) {
                login(name, pin);
                window.location.href = 'index.html';
            }
        });
    </script>
</body>

</html>
