<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧁</text></svg>">
  <title>Oups ! Page introuvable — GourmetRevient</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4f46e5;
      --primary-dark: #3730a3;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --font-display: 'Plus Jakarta Sans', sans-serif;
      --font-body: 'Outfit', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: #f8fafc;
      color: var(--text-main);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }
    .container {
      max-width: 600px;
      padding: 2rem;
    }
    .error-code {
      font-family: var(--font-display);
      font-size: 12rem;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #4f46e5 0%, #10b981 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
      opacity: 0.15;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: -1;
    }
    .icon {
      font-size: 5rem;
      margin-bottom: 2rem;
      display: inline-block;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    h1 {
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 1rem;
      color: #0f172a;
    }
    p {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      padding: 1rem 2.5rem;
      background: var(--primary);
      color: white;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 700;
      transition: all 0.3s ease;
      box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4);
    }
    .btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 15px 30px -5px rgba(79, 70, 229, 0.5);
    }
  </style>
</head>
<body>
  <div class="error-code">404</div>
  <div class="container">
    <div class="icon">🧁</div>
    <h1>Oups ! Cette recette n'existe pas.</h1>
    <p>Il semblerait que vous ayez suivi un lien brisé ou tapé une adresse erronée. Ne vous inquiétez pas, on vous ramène au laboratoire.</p>
    <a href="landing.html" class="btn">Retour à l'accueil</a>
  </div>
</body>
</html>
