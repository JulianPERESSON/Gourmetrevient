<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a14"/>
      <stop offset="60%" style="stop-color:#12121f"/>
      <stop offset="100%" style="stop-color:#0f0f1e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="60%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow blobs -->
  <circle cx="200" cy="150" r="250" fill="#6366f1" opacity="0.07"/>
  <circle cx="950" cy="500" r="300" fill="#10b981" opacity="0.06"/>
  <circle cx="700" cy="100" r="180" fill="#6366f1" opacity="0.05"/>

  <!-- Top gradient bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)" rx="2"/>

  <!-- Badge -->
  <rect x="80" y="72" width="220" height="36" rx="18" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <rect x="80" y="72" width="220" height="36" rx="18" fill="#6366f1" opacity="0.12"/>
  <text x="190" y="95" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#a5b4fc" text-anchor="middle" letter-spacing="2">🚀  SAAS · PÂTISSERIE</text>

  <!-- Main title -->
  <text x="80" y="210" font-family="Inter, Arial, sans-serif" font-size="82" font-weight="900" fill="url(#titleGrad)" letter-spacing="-2">GourmetRevient</text>

  <!-- Tagline -->
  <text x="80" y="268" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="400" fill="#94a3b8">La plateforme SaaS des artisans pâtissiers</text>

  <!-- Three value props -->
  <text x="80" y="340" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800" fill="#ffffff">Calculez.</text>
  <text x="290" y="340" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800" fill="#a5b4fc">Optimisez.</text>
  <text x="530" y="340" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800" fill="#10b981">Rentabilisez.</text>

  <!-- Divider -->
  <rect x="80" y="375" width="600" height="1.5" fill="url(#accent)" opacity="0.3"/>

  <!-- Stats row -->
  <text x="80" y="420" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">61 recettes</text>
  <text x="80" y="445" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b">intégrées</text>

  <text x="230" y="420" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Cloud + Hors-ligne</text>
  <text x="230" y="445" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b">PWA native</text>

  <text x="450" y="420" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">100% RGPD</text>
  <text x="450" y="445" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b">Données UE</text>

  <text x="600" y="420" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Stripe</text>
  <text x="600" y="445" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b">Paiement sécurisé</text>

  <!-- CTA Box -->
  <rect x="80" y="490" width="300" height="58" rx="14" fill="url(#accent)"/>
  <text x="230" y="525" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#ffffff" text-anchor="middle">Essai Gratuit →</text>

  <!-- Right side - decorative whisk icon area -->
  <circle cx="950" cy="315" r="200" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.15"/>
  <circle cx="950" cy="315" r="150" fill="none" stroke="#10b981" stroke-width="1" opacity="0.1"/>

  <!-- Whisk SVG icon -->
  <g transform="translate(895, 175) scale(1.2)" opacity="0.9">
    <line x1="45" y1="170" x2="45" y2="90" stroke="#6366f1" stroke-width="8" stroke-linecap="round"/>
    <path d="M45 90 C45 50, 20 30, 20 65 C20 78, 45 90, 45 90" stroke="#D4BA7A" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M45 90 C45 50, 70 30, 70 65 C70 78, 45 90, 45 90" stroke="#D4BA7A" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M45 90 C45 44, 32 18, 30 58 C29 72, 45 90, 45 90" stroke="#E8D5A3" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.8"/>
    <path d="M45 90 C45 44, 58 18, 60 58 C61 72, 45 90, 45 90" stroke="#E8D5A3" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.8"/>
    <circle cx="45" cy="90" r="7" fill="#6366f1" filter="url(#glow)"/>
    <circle cx="45" cy="172" r="5" fill="#A6883E"/>
  </g>

  <!-- Emoji icon large -->
  <text x="950" y="330" font-family="Arial" font-size="90" text-anchor="middle" opacity="0.85">🧁</text>

  <!-- Domain -->
  <text x="80" y="595" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">gourmetrevient.app · Conforme RGPD (UE) 2016/679</text>
  <text x="1120" y="595" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569" text-anchor="end">© 2026</text>
</svg>
